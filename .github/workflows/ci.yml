name: Helix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Type check
        run: |
          cd packages/shared && bun run lint || true
          cd packages/bridge && bun run lint || true
        # Web lint gestito separatamente per JSX
      
      - name: Format check
        run: bunx prettier --check "packages/**/*.{ts,tsx,json}"

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Build Bridge
        run: cd packages/bridge && bun run build
      
      - name: Build Web
        run: cd packages/web && bun run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Bridge Docker image
        run: docker build -t helix-bridge -f docker/bridge/Dockerfile .
      
      - name: Verify image
        run: docker images helix-bridge

